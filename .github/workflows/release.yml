name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build DMG
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: Scripts/package-app.sh
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUNDLE_IDENTIFIER: ca.droot.room-light-sensor

      - name: Create checksum
        run: shasum -a 256 ".build/package/Room Light Sensor-${{ steps.version.outputs.version }}.dmg" > ".build/package/Room Light Sensor-${{ steps.version.outputs.version }}.dmg.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            .build/package/Room Light Sensor-${{ steps.version.outputs.version }}.dmg
            .build/package/Room Light Sensor-${{ steps.version.outputs.version }}.dmg.sha256
          generate_release_notes: true
